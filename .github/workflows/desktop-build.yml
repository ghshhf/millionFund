name: Build Desktop Apps (Electron)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  # ── Windows ──
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Web App
        run: npm run build

      - name: Build Windows Installer
        run: npx electron-builder --win --x64

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI百万实盘-Windows
          path: release/desktop/*.exe

  # ── macOS ──
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Web App
        run: npm run build

      - name: Build macOS DMG
        run: npx electron-builder --mac --x64 --arm64

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI百万实盘-macOS
          path: release/desktop/*.dmg

  # ── Linux ──
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Web App
        run: npm run build

      - name: Build Linux AppImage & deb
        run: npx electron-builder --linux --x64

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI百万实盘-Linux
          path: |
            release/desktop/*.AppImage
            release/desktop/*.deb
