name: 全平台构建 (Web / Android / Windows / macOS / Linux)

on:
  push:
    branches: [main]
    tags:
      - 'v*'
      - 'V*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ────────────────────────────── Web ──────────────────────────────
  build-web:
    runs-on: ubuntu-latest
    name: 🌐 Web (静态站点)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Web
        run: npm run build 2>&1
      
      - name: 验证构建产物
        run: |
          if [ ! -f dist/index.html ]; then
            echo "::error::构建失败！dist/index.html 不存在"
            echo "::error::请检查上面的 TypeScript 错误信息"
            echo "::error::常见修复：运行 npm run typecheck 本地调试"
            exit 1
          fi
          echo "✅ Web 构建成功 (dist/${BRANCH:+main})"

      - name: 打包 zip
        run: |
          cd dist
          zip -r ../AI百万实盘-Web.zip .
          cd ..

      - name: Upload Web 产物
        uses: actions/upload-artifact@v4
        with:
          name: AI百万实盘-Web
          path: AI百万实盘-Web.zip

  # ──────────────────────────── Android ────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    name: 🤖 Android (APK)
    needs: build-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Install dependencies
        run: npm ci

      - name: Build Web + Sync Capacitor
        run: |
          npm run build
          npx cap sync android

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
          cd ..

      - name: 重命名并上传 APK
        run: |
          mv android/app/build/outputs/apk/debug/app-debug.apk AI百万实盘-Android-debug.apk
          echo "APK 大小: $(ls -lh AI百万实盘-Android-debug.apk | awk '{print $5}')"

      - name: Upload Android 产物
        uses: actions/upload-artifact@v4
        with:
          name: AI百万实盘-Android-debug
          path: AI百万实盘-Android-debug.apk

  # ─────────────────────────── Windows ─────────────────────────────
  build-windows:
    runs-on: windows-latest
    name: 🪟 Windows (安装包)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Web App
        run: npm run build

      - name: Build Windows Installer
        run: npx electron-builder --win --x64

      - name: Upload Windows 产物
        uses: actions/upload-artifact@v4
        with:
          name: AI百万实盘-Windows
          path: release/desktop/*.exe

  # ──────────────────────────── macOS ──────────────────────────────
  build-macos:
    runs-on: macos-latest
    name: 🍎 macOS (DMG)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Web App
        run: npm run build

      - name: Build macOS DMG
        run: npx electron-builder --mac --x64 --arm64

      - name: Upload macOS 产物
        uses: actions/upload-artifact@v4
        with:
          name: AI百万实盘-macOS
          path: release/desktop/*.dmg

  # ─────────────────────────── Linux ───────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    name: 🐧 Linux (AppImage / deb)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Web App
        run: npm run build

      - name: Build Linux AppImage & deb
        run: npx electron-builder --linux --x64

      - name: Upload Linux 产物
        uses: actions/upload-artifact@v4
        with:
          name: AI百万实盘-Linux
          path: |
            release/desktop/*.AppImage
            release/desktop/*.deb

  # ───────────────────── 打 tag 时发布到 Releases ─────────────────
  release:
    name: 📦 发布到 GitHub Releases
    needs: [build-web, build-android, build-windows, build-macos, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: 下载全部产物
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: 列出下载的产物
        run: ls -lhR release-assets/

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          name: AI百万实盘 ${{ github.ref_name }}
          generate_release_notes: true
          files: release-assets/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ───────────────────── 每次 push main 发布开发版 ─────────────────
  release-dev:
    name: 📦 发布开发版到 GitHub Releases
    needs: [build-web, build-android, build-windows, build-macos, build-linux]
    if: github.ref == 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: 下载全部产物
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: 列出下载的产物
        run: ls -lhR release-assets/

      - name: 删除旧的开发版 Release
        uses: dev-drprasad/delete-older-releases@v1.2
        with:
          keep_latest: 0
          delete_tag_pattern: 'dev-*'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 创建开发版 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-${{ github.sha }}
          name: AI百万实盘 开发版 (${{ github.sha }})
          body: |
            🔧 开发版本 - 基于最新代码构建

            构建时间: ${{ github.event.head_commit.timestamp }}
            提交信息: ${{ github.event.head_commit.message }}

            💡 建议使用正式版 (v* 标签) 用于日常使用
          prerelease: true
          files: release-assets/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
