name: 全平台构建 (Web / Android / Windows / macOS / Linux)

on:
  push:
    branches: [main]
    tags:
      - 'v*'
      - 'V*'
  workflow_dispatch:

permissions:
  contents: write
  checks: write
  pull-requests: write

jobs:
  # ────────────────────────────── 测试（新增）──────────────────────────────
  test:
    name: ✅ 单元测试 & 覆盖率检查
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: 📊 运行单元测试（含覆盖率）
        run: npm run test:coverage

      - name: 📊 上传覆盖率到 Codecov
        if: always()
        continue-on-error: true
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/coverage-summary.json
          fail_ci_if_error: false

      - name: 🔎 覆盖率门禁检查（警告模式）
        run: |
          if [ ! -f coverage/coverage-summary.json ]; then
            echo "::warning::未生成覆盖率报告，请检查测试配置"
            exit 0
          fi

          COVERAGE=$(node -e "const d=require('./coverage/coverage-summary.json'); const p=d.total.lines.pct; console.log(p)")
          echo "📊 当前行覆盖率: ${COVERAGE}%"
          echo "⚠️ 目标覆盖率: 60%（当前为警告模式，不阻塞构建）"

          # 使用 node 做浮点比较，避免 bc 依赖
          node -e "
            const c = parseFloat(process.argv[1]);
            if (c < 60) {
              console.log('::warning::覆盖率低于 60%！当前 ' + c + '%，建议添加更多单元测试');
            } else {
              console.log('✅ 覆盖率检查通过: ' + c + '% ≥ 60%');
            }
          " "$COVERAGE"

          # 不阻塞构建 - 仅警告
          exit 0

      - name: 📊 评论 PR（覆盖率变化）
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs')
            if (!fs.existsSync('./coverage/coverage-summary.json')) return

            const summary = require('./coverage/coverage-summary.json')
            const pct = summary.total.lines.pct
            const branch = summary.total.branches.pct
            const func = summary.total.functions.pct

            const status = pct < 60
              ? '⚠️ **覆盖率低于 60% 门禁**，请添加更多测试！'
              : '✅ 覆盖率符合门禁要求（≥ 60%）'

            const body = `## 📊 测试覆盖率报告

| 维度 | 覆盖率 |
|------|---------|
| 行覆盖率 | **${pct}%** |
| 分支覆盖率 | ${branch}% |
| 函数覆盖率 | ${func}% |

${status}`

            // Use pr comment instead of issue comment for PR context
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body
            })

  # ────────────────────────────── E2E 测试（新增）─────────────────────
  test-e2e:
    name: 🌐 E2E 测试（Playwright）
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: 🌐 安装 Playwright 浏览器
        run: npx playwright install --with-deps

      - name: 🌐 运行 E2E 测试
        run: npm run test:e2e

      - name: 🌐 上传 Playwright 报告（失败时）
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/

  # ────────────────────────────── Web ───────────────────────────────
  build-web:
    name: 🌐 Web (静态站点)
    runs-on: ubuntu-latest
    needs: [test, test-e2e]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Web
        run: npm run build 2>&1
      
      - name: 验证构建产物
        run: |
          if [ ! -f dist/index.html ]; then
            echo "::error::构建失败！dist/index.html 不存在"
            exit 1
          fi
          echo "✅ Web 构建成功"

      - name: 打包 zip
        run: |
          cd dist
          zip -r ../AI百万实盘-Web.zip .
          cd ..

      - name: Upload Web 产物
        uses: actions/upload-artifact@v7
        with:
          name: AI百万实盘-Web
          path: AI百万实盘-Web.zip

  # ─────────────────────────── Android ─────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    name: 🤖 Android (APK)
    needs: build-web
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm ci

      - name: Build Web + Sync Capacitor
        run: |
          npm run build
          npx cap sync android

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
          cd ..

      - name: 重命名并上传 APK
        run: |
          mv android/app/build/outputs/apk/debug/app-debug.apk AI百万实盘-Android-debug.apk
          echo "APK 大小: $(ls -lh AI百万实盘-Android-debug.apk | awk '{print $5}')"

      - name: Upload Android 产物
        uses: actions/upload-artifact@v7
        with:
          name: AI百万实盘-Android-debug
          path: AI百万实盘-Android-debug.apk

  # ─────────────────────────── Windows ───────────────────────────
  build-windows:
    runs-on: windows-latest
    name: 🪟 Windows (安装包)
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Web App
        run: npm run build

      - name: Build Windows Installer
        run: npx electron-builder --win --x64

      - name: Upload Windows 产物
        uses: actions/upload-artifact@v7
        with:
          name: AI百万实盘-Windows
          path: release/desktop/*.exe

  # ─────────────────────────── macOS ─────────────────────────────
  build-macos:
    runs-on: macos-latest
    name: 🍎 macOS (DMG)
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Web App
        run: npm run build

      - name: Build macOS DMG
        run: npx electron-builder --mac --x64 --arm64

      - name: Upload macOS 产物
        uses: actions/upload-artifact@v7
        with:
          name: AI百万实盘-macOS
          path: release/desktop/*.dmg

  # ─────────────────────────── Linux ───────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    name: 🐧 Linux (AppImage / deb)
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Web App
        run: npm run build

      - name: Build Linux AppImage & deb
        run: npx electron-builder --linux --x64

      - name: Upload Linux 产物
        uses: actions/upload-artifact@v7
        with:
          name: AI百万实盘-Linux
          path: |
            release/desktop/*.AppImage
            release/desktop/*.deb

  # ───────────────────── 打 tag 时发布到 Releases ─────────────────
  release:
    name: 📦 发布到 GitHub Releases
    needs: [build-web, build-android, build-windows, build-macos, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: 下载全部产物
        uses: actions/download-artifact@v7
        with:
          path: release-assets/

      - name: 列出下载的产物
        run: ls -lhR release-assets/

      - name: 创建 Release
        uses: softprops/action-gh-release@v3
        with:
          name: AI百万实盘 ${{ github.ref_name }}
          generate_release_notes: true
          files: release-assets/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ───────────────────── 每次 push main 发布开发版 ─────────────────
  release-dev:
    name: 📦 发布开发版到 GitHub Releases
    needs: [build-web, build-android, build-windows, build-macos, build-linux]
    if: github.ref == 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: 下载全部产物
        uses: actions/download-artifact@v7
        with:
          path: release-assets/

      - name: 列出下载的产物
        run: ls -lhR release-assets/

      - name: 删除旧的开发版 Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --json tagName -q '.[].tagName' | grep '^dev-' | while read tag; do
            gh release delete "$tag" --yes || true
          done

      - name: 创建开发版 Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: dev-${{ github.sha }}
          name: AI百万实盘 开发版 (${{ github.sha }})
          body: |
            🔧 开发版本 - 基于最新代码构建！

            构建时间: {{ github.event.head_commit.timestamp }}
            提交信息: {{ github.event.head_commit.message }}

            💡 建议使用正式版 (v* 标签) 用于日常使用
          prerelease: true
          files: release-assets/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
